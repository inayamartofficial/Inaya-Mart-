<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inaya Mart | Products</title>


<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

<script>
window.tailwind = window.tailwind || {};
tailwind.config = {
    theme: {
        extend: {
            colors: {
                gold: {
                    DEFAULT: '#C5A880',
                    premium: '#D4AF37'
                },
                luxury: {
                    black:'#111111',
                    lightBg:'#FAF9F6',
                    beige:'#F5F1EB'
                }
            },
            fontFamily:{
                serif:['Playfair Display','serif'],
                sans:['Inter','sans-serif']
            }
        }
    }
}
</script>

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>


</head>


<body class="bg-luxury-lightBg text-luxury-black font-sans">


<!-- Header -->

<header class="h-20 border-b border-luxury-beige flex items-center justify-between px-6">


<a href="index.html">

<img src="logo.png" class="h-12">

</a>


<h1 class="font-serif text-xl">
Products
</h1>


<button onclick="toggleCart(true)" 
class="relative">

🛒

<span id="cart-count"
class="absolute -top-2 -right-2 bg-black text-white rounded-full text-xs px-2">
0
</span>

</button>


</header>




<!-- Product Section -->

<main class="max-w-7xl mx-auto px-6 py-16">


<h2 class="font-serif text-3xl mb-10">
All Products
</h2>



<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">



<!-- Product 1 -->

<div class="bg-white border p-4">


<img src="images/abaya.jpg"
class="w-full h-80 object-cover">


<h3 class="font-serif mt-4">
Royal Georgette Premium Abaya
</h3>


<p class="text-gold mt-2">
৳2450 BDT
</p>


<button
onclick="addToCart('ABY001','Royal Georgette Premium Abaya',2450)"
class="w-full mt-4 bg-black text-white py-3">

Add To Cart

</button>


</div>





<!-- Product 2 -->

<div class="bg-white border p-4">


<img src="images/hijab.jpg"
class="w-full h-80 object-cover">


<h3 class="font-serif mt-4">
Luxury Linen Hijab Collection
</h3>


<p class="text-gold mt-2">
৳850 BDT
</p>


<button
onclick="addToCart('HIJ001','Luxury Linen Hijab Collection',850)"
class="w-full mt-4 bg-black text-white py-3">

Add To Cart

</button>


</div>





<!-- Product 3 -->

<div class="bg-white border p-4">


<img src="images/honey.jpg"
class="w-full h-80 object-cover">


<h3 class="font-serif mt-4">
Pure Sundarban Premium Honey
</h3>


<p class="text-gold mt-2">
৳1200 BDT
</p>


<button
onclick="addToCart('HON001','Pure Sundarban Premium Honey',1200)"
class="w-full mt-4 bg-black text-white py-3">

Add To Cart

</button>


</div>



</div>

</main>





<!-- Cart Sidebar -->

<div id="cart-sidebar"
class="fixed inset-0 bg-black/50 hidden z-50">


<div class="absolute right-0 top-0 h-full w-full max-w-md bg-white p-6">


<button onclick="toggleCart(false)">
Close
</button>


<h2 class="font-serif text-xl mt-5">
Shopping Cart
</h2>


<div id="cart-items-container"
class="mt-5">
</div>



<div class="border-t mt-5 pt-5">


<p>
Subtotal:
<span id="cart-subtotal">
৳0
</span>
</p>


<p>
Delivery:
<span id="cart-delivery_fee">
৳0
</span>
</p>


<h3>
Total:
<span id="cart-total">
৳0
</span>
</h3>


</div>



<button onclick="showOrderForm()"
id="checkout-btn"
class="w-full bg-black text-white py-3 mt-5">

Checkout

</button>



<div id="order-form"
class="hidden mt-5">


<input id="cust-name"
placeholder="Name"
class="border w-full p-2 mb-2">


<input id="cust-phone"
placeholder="Phone"
class="border w-full p-2 mb-2">


<textarea id="cust-address"
placeholder="Address"
class="border w-full p-2">
</textarea>



<select id="cust-location"
onchange="updateTotalCosts()"
class="border w-full p-2 mt-2">


<option value="inside">
Inside Dhaka ৳80
</option>


<option value="outside">
Outside Dhaka ৳150
</option>


</select>



<button onclick="submitOrder()"
class="bg-black text-white w-full py-3 mt-3">

Confirm Order

</button>

</div>

</div>

</div>

<!-- JS -->

<script src="js/app.js"></script>
<script src="js/cart.js"></script>
<script src="js/checkout.js"></script>

</body>
</html>
